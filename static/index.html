<!DOCTYPE html>
<html>
<head>
    <title>breakdown: Bayesian Metric Trees</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
    <style>
        #cy {
            width: 100%;
            height: 800px;
            display: block;
            border: 1px solid #ccc;
        }
        body { font-family: sans-serif; }
    </style>
</head>
<body>
    <h1>breakdown: Metric Tree Visualization</h1>
    <div id="cy"></div>
    <script>
        async function loadDag() {
            const response = await fetch('/dag');
            const data = await response.json();
            
            const elements = [];
            data.nodes.forEach(node => {
                elements.push({ data: { id: node[0], label: node[0] } });
            });
            data.edges.forEach(edge => {
                elements.push({ data: { source: edge[0], target: edge[1] } });
            });

            var cy = cytoscape({
                container: document.getElementById('cy'),
                elements: elements,
                style: [
                    {
                        selector: 'node',
                        style: {
                            'background-color': '#666',
                            'label': 'data(label)',
                            'color': '#fff',
                            'text-valign': 'center',
                            'text-halign': 'center',
                            'width': 60,
                            'height': 60
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 3,
                            'line-color': '#ccc',
                            'target-arrow-color': '#ccc',
                            'target-arrow-shape': 'triangle',
                            'curve-style': 'bezier'
                        }
                    }
                ],
                layout: {
                    name: 'breadthfirst',
                    directed: true,
                    padding: 10
                }
            });

            cy.on('tap', 'node', async function(evt){
                const node = evt.target;
                const response = await fetch('/metrics/' + node.id());
                const metricData = await response.json();
                console.log(metricData);
                alert('Metric: ' + node.id() + '\nSource: ' + metricData.definition.source);
            });
        }
        loadDag();
    </script>
</body>
</html>
